services:  
  mongo:
    image: mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=arqui
      - MONGO_INITDB_ROOT_PASSWORD=1221
    ports:
      - '27017:27017'
    volumes:
      - ./mongo-data:/data/db
    restart: always

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: arqui
      ME_CONFIG_MONGODB_ADMINPASSWORD: 1221
      ME_CONFIG_MONGODB_URL: mongodb://arqui:1221@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    restart: always

volumes:
  mongo-data:
  server:
  client:
