services:
  mongo:
    image: mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=arqui
      - MONGO_INITDB_ROOT_PASSWORD=1221
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: always

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    restart: always

volumes:
  mongo-data:
  server:
  client:
